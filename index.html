<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Interest Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      text-align: center;
      width: 280px;
    }
    h2 {
      margin-bottom: 15px;
      color: #333;
    }
    input {
      width: 90%;
      padding: 8px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      background: #4facfe;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background: #00c6ff;
    }
    #result {
      margin-top: 15px;
      font-weight: bold;
      color: #222;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>💰 Simple Interest</h2>

  <input type="number" id="p" placeholder="Principal"><br>
  <input type="number" id="r" placeholder="Rate (%)"><br>
  <input type="number" id="t" placeholder="Time (years)"><br>

  <button onclick="calculate()">Calculate</button>

  <div id="result"></div>
</div>

<script>
  function calculate() {
    let p = document.getElementById("p").value;
    let r = document.getElementById("r").value;
    let t = document.getElementById("t").value;

    if(p && r && t){
      let si = (p * r * t) / 100;
      document.getElementById("result").innerHTML =
        "Interest = ₹" + si.toFixed(2);
    } else {
      document.getElementById("result").innerHTML =
        "⚠️ Please fill all fields";
    }
  }
</script>

</body>
</html>
